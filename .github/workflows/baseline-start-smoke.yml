name: Baseline Start Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop

jobs:
  baseline-start-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run baseline start smoke
        run: npm run verify:baseline-start
