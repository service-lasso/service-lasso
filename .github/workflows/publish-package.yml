name: Publish Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@service-lasso"

      - name: Install dependencies
        run: npm ci

      - name: Compute publish version
        id: publish_version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_UTC="$(date -u +%Y.%-m.%-d)"
          VERSION="${DATE_UTC}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=service-lasso-package-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: npm test

      - name: Verify bounded runtime artifact
        env:
          SERVICE_LASSO_RELEASE_VERSION: ${{ steps.publish_version.outputs.version }}
        run: npm run release:verify

      - name: Verify publishable package
        env:
          SERVICE_LASSO_RELEASE_VERSION: ${{ steps.publish_version.outputs.version }}
        run: npm run package:verify

      - name: Check whether package version already exists
        id: package_exists
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: |
          if npm view @service-lasso/service-lasso@${{ steps.publish_version.outputs.version }} version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload staged publish package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.publish_version.outputs.artifact_name }}
          path: artifacts/npm/${{ steps.publish_version.outputs.artifact_name }}

      - name: Publish package to GitHub Packages
        if: steps.package_exists.outputs.exists != 'true'
        working-directory: artifacts/npm/${{ steps.publish_version.outputs.artifact_name }}
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm publish
