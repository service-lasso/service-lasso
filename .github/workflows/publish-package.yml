name: Publish Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Compute publish version
        id: publish_version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_UTC="$(date -u +%Y.%-m.%-d)"
          VERSION="${DATE_UTC}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=service-lasso-package-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: npm test

      - name: Verify bounded runtime artifact
        env:
          SERVICE_LASSO_RELEASE_VERSION: ${{ steps.publish_version.outputs.version }}
        run: npm run release:verify

      - name: Verify publishable package
        env:
          SERVICE_LASSO_RELEASE_VERSION: ${{ steps.publish_version.outputs.version }}
        run: npm run package:verify

      - name: Check whether package version already exists
        id: package_exists
        run: |
          if npm view @service-lasso/service-lasso@${{ steps.publish_version.outputs.version }} version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload staged publish package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.publish_version.outputs.artifact_name }}
          path: artifacts/npm/${{ steps.publish_version.outputs.artifact_name }}

      - name: Check npm token is configured
        if: steps.package_exists.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN repository secret is required to publish @service-lasso/service-lasso to npm." >&2
            exit 1
          fi

      - name: Publish package to npm
        if: steps.package_exists.outputs.exists != 'true'
        working-directory: artifacts/npm/${{ steps.publish_version.outputs.artifact_name }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Verify published package from npm
        env:
          SERVICE_LASSO_VERIFY_PACKAGE_VERSION: ${{ steps.publish_version.outputs.version }}
          SERVICE_LASSO_VERIFY_PACKAGE_REGISTRY: https://registry.npmjs.org
        run: npm run verify:package-consumer
