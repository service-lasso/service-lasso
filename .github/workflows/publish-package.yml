name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@service-lasso"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify bounded runtime artifact
        run: npm run release:verify

      - name: Verify publishable package
        run: npm run package:verify

      - name: Read publish package version
        id: publish_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=service-lasso-package-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload staged publish package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.publish_version.outputs.artifact_name }}
          path: artifacts/npm/${{ steps.publish_version.outputs.artifact_name }}

      - name: Publish package to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: artifacts/npm/${{ steps.publish_version.outputs.artifact_name }}
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: npm publish
