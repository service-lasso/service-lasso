name: Release Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute release version
        id: release_version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_UTC="$(date -u +%Y.%-m.%-d)"
          VERSION="${DATE_UTC}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=service-lasso-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: npm test

      - name: Verify bounded release artifact
        env:
          SERVICE_LASSO_RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: npm run release:verify

      - name: Upload staged artifact folder
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release_version.outputs.artifact_name }}
          path: artifacts/${{ steps.release_version.outputs.artifact_name }}

      - name: Upload packaged archive
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.release_version.outputs.artifact_name }}-archive
          path: artifacts/${{ steps.release_version.outputs.artifact_name }}.tar.gz

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.release_version.outputs.version }}"
          ARCHIVE_PATH="artifacts/${{ steps.release_version.outputs.artifact_name }}.tar.gz"
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --target "${GITHUB_SHA}" --title "$TAG_NAME" --notes "Bounded runtime artifact release for service-lasso."
          gh release upload "$TAG_NAME" "$ARCHIVE_PATH" --clobber
