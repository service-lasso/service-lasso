name: Verify Package Consumer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional published package version to verify from npm
        required: false
        type: string
      registry:
        description: Package registry to verify
        required: false
        default: https://registry.npmjs.org
        type: string

jobs:
  verify-package-consumer:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package consumer install
        env:
          SERVICE_LASSO_VERIFY_PACKAGE_VERSION: ${{ inputs.version }}
          SERVICE_LASSO_VERIFY_PACKAGE_REGISTRY: ${{ inputs.registry }}
        run: npm run verify:package-consumer
